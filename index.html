<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Learning Product LP Template</title>
  <meta name="description" content="手機優先、中文專用、8頁點擊式學習商品LP模板。">
  <style>
    :root {
      --cream:#fff2cf;
      --paper:#fffaf0;
      --orange:#f47a20;
      --orange2:#d95b12;
      --yellow:#ffd64d;
      --blue:#176fc2;
      --green:#38a76b;
      --pink:#ff7aa6;
      --ink:#21304a;
      --muted:#687083;
      --shadow:0 20px 45px rgba(126,77,18,.18);
      --font:"Noto Sans TC","Microsoft JhengHei UI","PingFang TC",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;overflow:hidden;font-family:var(--font);color:var(--ink);background:linear-gradient(135deg,#fff7df,#ffe4b7)}
    a{text-decoration:none;color:inherit}
    button{font:inherit}
    .app{min-height:100svh;display:grid;place-items:center;padding:16px;background:
      radial-gradient(circle at 8% 15%,rgba(255,214,77,.45),transparent 180px),
      radial-gradient(circle at 92% 20%,rgba(255,122,166,.25),transparent 170px)}
    .phone{width:min(100%,430px);height:min(100svh - 32px,820px);min-height:610px;position:relative;overflow:hidden;border-radius:30px;background:var(--paper);box-shadow:var(--shadow);border:2px solid rgba(255,255,255,.8)}
    .slide{position:absolute;inset:0;padding:22px 20px 92px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;opacity:0;visibility:hidden;transform:translateX(28px);transition:.34s ease;background:var(--bg)}
    .slide.active{opacity:1;visibility:visible;transform:translateX(0);z-index:2}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .brand{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:900;color:var(--blue);letter-spacing:.08em;text-transform:uppercase}
    .mark{width:28px;height:28px;border-radius:9px;background:conic-gradient(var(--orange),var(--yellow),var(--blue),var(--orange));border:3px solid #fff;box-shadow:0 5px 12px rgba(0,0,0,.12)}
    .tag{padding:7px 10px;border-radius:999px;background:var(--blue);color:#fff;font-size:12px;font-weight:900;white-space:nowrap}
    .body{display:grid;align-content:center;gap:16px;min-height:0}
    .kicker{width:max-content;padding:7px 11px;border-radius:999px;background:#fff;color:var(--orange2);font-size:12px;font-weight:900;box-shadow:0 8px 20px rgba(117,79,20,.1)}
    h1,h2,p{margin:0}
    h1,h2{line-height:1.08;color:#123a68;letter-spacing:0}
    h1{font-size:clamp(34px,10vw,52px);font-weight:950}
    h2{font-size:clamp(28px,8vw,40px);font-weight:950}
    .lead{font-size:16px;line-height:1.7;font-weight:750}
    .note{font-size:12px;line-height:1.55;color:var(--muted)}
    .stage{min-height:230px;border-radius:26px;display:grid;place-items:center;position:relative;overflow:hidden;background:repeating-linear-gradient(-8deg,#ffe58d 0 14px,#fff4ca 14px 28px)}
    .pack{width:170px;aspect-ratio:3/4;border-radius:26px;display:grid;place-items:center;padding:18px;background:linear-gradient(145deg,var(--orange),#ff9f38);color:#fff;font-weight:950;text-align:center;box-shadow:0 20px 32px rgba(160,89,18,.28);transform:rotate(-4deg)}
    .burst{position:absolute;width:86px;height:86px;border-radius:50%;display:grid;place-items:center;text-align:center;background:var(--yellow);border:5px solid #fff;color:#123a68;font-weight:950;line-height:1.15;box-shadow:0 10px 20px rgba(99,68,14,.18)}
    .burst.a{right:12px;top:14px;transform:rotate(8deg)} .burst.b{left:12px;bottom:16px;background:#fff;color:var(--orange2);transform:rotate(-8deg)}
    .btns{display:grid;gap:8px}.btn{min-height:52px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:linear-gradient(#ff9444,var(--orange2));color:#fff;font-size:17px;font-weight:950;box-shadow:0 12px 22px rgba(217,91,18,.22)}
    .bubble-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.bubble{min-height:92px;padding:14px;border-radius:22px;background:#fff;font-weight:900;color:#123a68;box-shadow:0 12px 22px rgba(117,79,20,.1);position:relative}.bubble small{display:block;color:var(--orange2);font-weight:950;margin-bottom:5px}.bubble:after{content:"";position:absolute;right:18px;bottom:-6px;width:16px;height:16px;background:inherit;transform:rotate(45deg);border-radius:4px}
    .orbit{min-height:310px;position:relative;display:grid;place-items:center}.center{width:156px;height:156px;border-radius:50%;display:grid;place-items:center;text-align:center;background:linear-gradient(145deg,var(--orange),#ffac38);border:7px solid #fff;color:#fff;font-size:23px;font-weight:950;box-shadow:0 18px 30px rgba(160,89,18,.23)}
    .orb{position:absolute;width:124px;min-height:72px;padding:10px;border-radius:20px;display:grid;place-items:center;text-align:center;background:#fff;color:#123a68;font-size:13px;font-weight:900;box-shadow:0 10px 20px rgba(117,79,20,.12)}
    .orb:nth-child(2){top:6px;left:4px;transform:rotate(-6deg)}.orb:nth-child(3){top:18px;right:2px;transform:rotate(7deg)}.orb:nth-child(4){bottom:18px;left:10px;transform:rotate(5deg)}.orb:nth-child(5){bottom:4px;right:12px;transform:rotate(-5deg)}
    .card{padding:16px;border-radius:22px;background:#fff;box-shadow:0 12px 24px rgba(117,79,20,.11)}.card-title{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:950;color:#123a68;margin-bottom:10px}.num{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--orange);color:#fff}
    .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.step{min-height:78px;border-radius:16px;display:grid;place-items:center;text-align:center;padding:8px;background:#fff0b5;color:#123a68;font-size:13px;font-weight:900}
    .media{display:grid;grid-template-columns:.95fr 1.05fr;gap:12px;align-items:center}.photo{min-height:150px;border-radius:22px;display:grid;place-items:center;background:linear-gradient(145deg,var(--blue),#56b7ff);color:#fff;font-weight:950;text-align:center;box-shadow:inset 0 0 0 5px rgba(255,255,255,.24)}.checks{display:grid;gap:8px}.check{display:flex;gap:8px;font-size:14px;line-height:1.45;font-weight:850}.check:before{content:"";width:17px;height:17px;margin-top:2px;border-radius:50%;background:var(--green);box-shadow:inset 0 0 0 5px #fff;flex:0 0 auto}
    .info-grid,.lineup{display:grid;gap:10px}.info{display:grid;grid-template-columns:82px 1fr;gap:10px;align-items:center;padding:12px;border-radius:18px;background:#fff;box-shadow:0 10px 20px rgba(117,79,20,.1);font-weight:850}.info strong{color:var(--orange2);font-size:13px}
    .product{display:grid;grid-template-columns:78px 1fr;gap:12px;align-items:center;padding:12px;border-radius:20px;background:#fff;box-shadow:0 10px 20px rgba(117,79,20,.1)}.thumb{aspect-ratio:1;border-radius:16px;display:grid;place-items:center;background:linear-gradient(145deg,var(--orange),var(--pink));color:#fff;font-size:13px;font-weight:950;text-align:center}.product h3{margin:0 0 4px;color:#123a68;font-size:16px}.product p{font-size:13px;line-height:1.45;color:var(--muted)}
    .nav{position:absolute;left:14px;right:14px;bottom:14px;z-index:8;display:grid;grid-template-columns:52px 1fr 52px;gap:10px;align-items:center;pointer-events:none}.nav button{pointer-events:auto}.circle{width:52px;height:52px;border:0;border-radius:50%;display:grid;place-items:center;background:#123a68;color:#fff;box-shadow:0 12px 22px rgba(18,58,104,.22);cursor:pointer}.circle:disabled{opacity:.3;cursor:default}.arrow{width:13px;height:13px;border-top:3px solid currentColor;border-right:3px solid currentColor}.prev{transform:rotate(-135deg);margin-left:4px}.next{transform:rotate(45deg);margin-right:4px}
    .progress{height:52px;border-radius:999px;background:rgba(255,255,255,.84);backdrop-filter:blur(8px);display:grid;align-content:center;gap:7px;box-shadow:0 10px 20px rgba(117,79,20,.1)}.count{text-align:center;font-size:12px;font-weight:950;color:#123a68;letter-spacing:.08em}.dots{display:flex;justify-content:center;gap:5px}.dot{width:7px;height:7px;border:0;border-radius:999px;background:rgba(18,58,104,.22);padding:0;cursor:pointer}.dot.active{width:20px;background:var(--orange)}
    @media(max-width:420px){.app{padding:0}.phone{width:100%;height:100svh;min-height:560px;border-radius:0;border:0}.slide{padding:20px 18px 90px}.stage{min-height:210px}.orbit{min-height:290px}.center{width:148px;height:148px}.orb{width:116px}}
  </style>
</head>
<body>
  <div class="app">
    <main class="phone">
      <div id="slides"></div>
      <div class="nav">
        <button class="circle" id="prev" aria-label="上一頁"><span class="arrow prev"></span></button>
        <div class="progress"><div class="count" id="count">01 / 08</div><div class="dots" id="dots"></div></div>
        <button class="circle" id="next" aria-label="下一頁"><span class="arrow next"></span></button>
      </div>
    </main>
  </div>
  <script>
    const DATA={brand:"Learning LP",cta:"立即了解方案",url:"#",slides:[
      {type:"hero",tag:"Hero",k:"主視覺",t:"讓孩子每天都想翻開的學習體驗",l:"用明亮、直接、好懂的方式，把商品主張、年齡、價值和CTA在第一頁說清楚。",bg:"#fff2cf"},
      {type:"bubbles",tag:"共感",k:"Parent insight",t:"先接住家長心裡的擔心",l:"用短句吹出痛點，不寫長文，讓家長快速覺得「這就是我」。",bg:"#fff0cc",items:["想開始學，但不知道怎麼陪","怕教材買了之後用不久","希望孩子主動靠近學習","需要一套容易持續的方式"]},
      {type:"orbit",tag:"定番價值",k:"Core value",t:"把選擇理由變成4個好記的賣點",bg:"#ffe9bd",items:["每天都能用","親子一起玩","聽看操作並行","年齡設計清楚"]},
      {type:"reason",tag:"理由 1",k:"Learning design",t:"理由1：學習設計有順序",l:"把ACTS / ABDT或商品Context轉成簡單圖解，讓家長知道孩子不是隨便玩。",bg:"#eaf6ff",steps:["接觸","理解","表達"]},
      {type:"media",tag:"理由 2",k:"Product experience",t:"理由2：教材體驗看得見",l:"放入教材照片、使用情境或內容物。版面保留大圖區，之後可替換正式素材。",bg:"#fff4df",checks:["一眼看懂內容物","用3步驟說明怎麼玩","用短句避免資訊過載"]},
      {type:"reason",tag:"理由 3",k:"Keep going",t:"理由3：家長比較容易持續",l:"不要只說孩子喜歡，也要說明家長為什麼不累、好準備、好開始。",bg:"#edf9ef",steps:["準備少","陪伴短","回饋快"]},
      {type:"info",tag:"安心資訊",k:"Before CTA",t:"申購前需要知道的事",l:"把價格、對象、內容物、注意事項整理成清楚的小卡。",bg:"#fff0cf",rows:[["適合對象","填入年齡、程度或家庭情境"],["內容物","填入教材、服務、贈品或方案"],["價格活動","填入正式價格與活動限制"],["注意事項","填入配送、效期、退換或法規文字"]]},
      {type:"lineup",tag:"CTA",k:"Final action",t:"選擇適合你的方案",l:"最後用商品卡或方案卡收束。若只有單一商品，也可以改成一張大CTA卡。",bg:"#ffe7b3",products:[["方案A","主推商品 / 入門方案"],["方案B","進階商品 / 加購方案"],["方案C","相關商品 / 系列推薦"]]}
    ]};
    const $=s=>document.querySelector(s),slides=$("#slides"),dots=$("#dots"),count=$("#count"),prev=$("#prev"),next=$("#next");
    function top(s){return `<div class="top"><div class="brand"><span class="mark"></span>${DATA.brand}</div><div class="tag">${s.tag}</div></div>`}
    function cta(){return `<div class="btns"><a class="btn" href="${DATA.url}">${DATA.cta}</a></div>`}
    function render(s,i){
      let body="";
      if(s.type==="hero")body=`<div class="body"><span class="kicker">${s.k}</span><h1>${s.t}</h1><p class="lead">${s.l}</p><div class="stage"><div class="pack">商品主視覺</div><div class="burst a">主訴求</div><div class="burst b">年齡</div></div></div>${cta()}`;
      if(s.type==="bubbles")body=`<div class="body"><span class="kicker">${s.k}</span><h2>${s.t}</h2><p class="lead">${s.l}</p><div class="bubble-grid">${s.items.map((x,n)=>`<div class="bubble"><small>0${n+1}</small>${x}</div>`).join("")}</div></div><p class="note">正式商品Context後，這裡會替換成真實洞察。</p>`;
      if(s.type==="orbit")body=`<div class="body"><span class="kicker">${s.k}</span><h2>${s.t}</h2><div class="orbit"><div class="center">選它的理由</div>${s.items.map(x=>`<div class="orb">${x}</div>`).join("")}</div></div>${cta()}`;
      if(s.type==="reason")body=`<div class="body"><span class="kicker">${s.k}</span><h2>${s.t}</h2><p class="lead">${s.l}</p><div class="card"><div class="card-title"><span class="num">${i+1}</span>圖解重點</div><div class="steps">${s.steps.map(x=>`<div class="step">${x}</div>`).join("")}</div></div></div><p class="note">適合放學習理論、能力階段或教材設計邏輯。</p>`;
      if(s.type==="media")body=`<div class="body"><span class="kicker">${s.k}</span><h2>${s.t}</h2><p class="lead">${s.l}</p><div class="media"><div class="photo">教材照片</div><div class="checks">${s.checks.map(x=>`<div class="check">${x}</div>`).join("")}</div></div></div>${cta()}`;
      if(s.type==="info")body=`<div class="body"><span class="kicker">${s.k}</span><h2>${s.t}</h2><p class="lead">${s.l}</p><div class="info-grid">${s.rows.map(r=>`<div class="info"><strong>${r[0]}</strong><span>${r[1]}</span></div>`).join("")}</div></div><p class="note">價格與活動資訊請以正式資料源為準。</p>`;
      if(s.type==="lineup")body=`<div class="body"><span class="kicker">${s.k}</span><h2>${s.t}</h2><p class="lead">${s.l}</p><div class="lineup">${s.products.map(p=>`<div class="product"><div class="thumb">${p[0]}</div><div><h3>${p[0]}</h3><p>${p[1]}</p></div></div>`).join("")}</div></div>${cta()}`;
      return `<section class="slide" style="--bg:${s.bg}">${top(s)}${body}</section>`;
    }
    slides.innerHTML=DATA.slides.map(render).join("");
    dots.innerHTML=DATA.slides.map((_,i)=>`<button class="dot" aria-label="第${i+1}頁"></button>`).join("");
    const pages=[...document.querySelectorAll(".slide")],dot=[...document.querySelectorAll(".dot")];let idx=0,start=null;
    function show(n){idx=Math.max(0,Math.min(pages.length-1,n));pages.forEach((p,i)=>p.classList.toggle("active",i===idx));dot.forEach((d,i)=>d.classList.toggle("active",i===idx));count.textContent=`${String(idx+1).padStart(2,"0")} / ${String(pages.length).padStart(2,"0")}`;prev.disabled=idx===0;next.disabled=idx===pages.length-1}
    prev.onclick=()=>show(idx-1);next.onclick=()=>show(idx+1);dot.forEach((d,i)=>d.onclick=()=>show(i));
    addEventListener("keydown",e=>{if(["ArrowLeft","ArrowUp"].includes(e.key))show(idx-1);if(["ArrowRight","ArrowDown"," "].includes(e.key))show(idx+1)});
    addEventListener("touchstart",e=>start=e.touches[0].clientX,{passive:true});addEventListener("touchend",e=>{if(start==null)return;const diff=start-e.changedTouches[0].clientX;if(Math.abs(diff)>45)show(idx+(diff>0?1:-1));start=null},{passive:true});
    show(0);
  </script>
</body>
</html>
